  <style>
    /* Prevent white flash during load */
    html,
    body {
      background-color: #ffffff !important;
      margin: 0;
      padding: 0;
    }

    /* 彻底消除所有元素的点击/聚焦黑框 */
    *,
    *:focus,
    *:focus-visible,
    *:focus-within,
    *:active {
      outline: none !important;
      -webkit-tap-highlight-color: transparent !important;
      -webkit-focus-ring-color: transparent !important;
    }

    /* Loading screen with butterfly animation */
    #app-loading-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      /* 使用多种高度单位确保在各种浏览器/设备上都能覆盖完整视口 */
      height: 100%;
      height: 100vh;
      height: 100dvh;
      /* 向四周扩展以确保覆盖安全区 */
      min-height: -webkit-fill-available;
      background-color: #ffffff;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.4s ease;
      /* 确保不受父元素影响 */
      overflow: hidden;
    }

    #app-loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* 在 loading 期间隐藏所有底层内容，防止穿帮 */
    body.app-loading #nuo-os-root {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    body.app-loading #desktop-dock,
    body.app-loading #home-screen-pages {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    /* Butterfly loader by WerlynDev - Uiverse.io */
    .loader {
      --sizeLoader: 60px;
      --sizeLoaderHalf: calc(var(--sizeLoader) / 2);
      --stepBtf: calc(var(--sizeLoader) / 10);
      display: flex;
      position: relative;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      width: var(--sizeLoader);
      height: var(--sizeLoader);
      right: var(--sizeLoaderHalf);
      transform-origin: center right;
      animation: moveAround 2s linear infinite;
      filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.2));
    }

    .loader svg:nth-child(1) {
      position: relative;
      height: 100%;
      left: 2%;
      transform-origin: center right;
      animation: wing 0.5s ease-in-out infinite;
    }

    .loader svg:nth-child(2) {
      height: 50%;
    }

    .loader svg:nth-child(3) {
      position: relative;
      height: 100%;
      left: -2%;
      transform-origin: center left;
      animation: wing 0.5s ease-in-out infinite;
    }

    @keyframes wing {
      0% {
        transform: rotateY(0deg);
      }

      50% {
        transform: rotateY(60deg);
      }

      100% {
        transform: rotateY(0deg);
      }
    }

    @keyframes moveAround {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    (function () {
      // 設計目標：用戶永遠不應該看到白屏，也永遠不應該看到「載入失敗請點此重試」的提示。
      // 策略：
      //  1. 蝴蝶 loading overlay 只在 React 真的渲染出內容後才移除（不再依時間硬拆）
      //  2. 偵測到 React 長時間沒 mount 時，背景靜默地解除 SW 註冊 + 清快取 + 重新載入
      //     ——對用戶來說只是「載入比較久」，沒有任何彈窗或按鈕
      //  3. 限制靜默修復頻率，避免 reload 死循環

      var WATCHDOG_STAGE1_MS = 12000;        // 第一階段：主腳本應該已啟動
      var WATCHDOG_STAGE2_MS = 35000;        // 第二階段：給初始化更寬裕時間，避免慢網誤判
      var SILENT_RECOVER_KEY = 'nuojiji-silent-recover-attempts';
      var SILENT_RECOVER_WINDOW_MS = 10 * 60 * 1000;  // 10 分鐘窗口
      var SILENT_RECOVER_MAX_ATTEMPTS = 2;            // 同一窗口最多 2 次

      var overlayRemoved = false;
      var silentRecoverInFlight = false;

      function hasReactRenderedContent() {
        var appRoot = document.getElementById('nuo-os-root');
        var root = document.getElementById('root');
        return !!(appRoot && appRoot.children && appRoot.children.length > 0)
          || !!(root && root.children && root.children.length > 0);
      }

      function hasMainScriptStarted() {
        return window.__nuojijiMainScriptStarted === true;
      }

      function hasAppReadySignal() {
        return window.__nuojijiAppReady === true;
      }

      function isOverlayVisible() {
        var loadingOverlay = document.getElementById('app-loading-overlay');
        return !!loadingOverlay && !loadingOverlay.classList.contains('fade-out');
      }

      function forceRemoveLoadingOverlay(reason) {
        if (overlayRemoved) return;
        // 🔧 關鍵保護：React 還沒渲染任何內容就絕對不拆 overlay。
        // 寧可讓蝴蝶多轉一會兒，也不要露出白底。
        // 唯一例外：reason === 'app-ready'（由 App.jsx initApp 完成後主動呼叫，
        // 此時 React 必然已經 mount，content 檢查也會通過）
        if (!hasReactRenderedContent() && reason !== 'app-ready') {
          return;
        }
        var loadingOverlay = document.getElementById('app-loading-overlay');
        document.body.classList.remove('app-loading');

        if (!loadingOverlay) { overlayRemoved = true; return; }
        if (!loadingOverlay.classList.contains('fade-out')) {
          loadingOverlay.classList.add('fade-out');
        }
        overlayRemoved = true;

        window.setTimeout(function () {
          if (loadingOverlay && loadingOverlay.parentNode) {
            loadingOverlay.remove();
          }
        }, 450);
      }

      // 讀取最近 10 分鐘內的靜默修復次數
      function getRecentRecoverAttempts() {
        try {
          var raw = localStorage.getItem(SILENT_RECOVER_KEY);
          if (!raw) return [];
          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          var cutoff = Date.now() - SILENT_RECOVER_WINDOW_MS;
          return parsed.filter(function (t) { return typeof t === 'number' && t > cutoff; });
        } catch (_e) {
          return [];
        }
      }

      function recordRecoverAttempt() {
        try {
          var attempts = getRecentRecoverAttempts();
          attempts.push(Date.now());
          localStorage.setItem(SILENT_RECOVER_KEY, JSON.stringify(attempts));
        } catch (_e) { }
      }

      // 靜默修復：背景解除 SW + 清快取 + 重載，全程不顯示任何 UI
      function silentRecover(reason) {
        if (silentRecoverInFlight) return;
        if (hasReactRenderedContent()) return;
        if (hasAppReadySignal()) return;
        if (!isOverlayVisible()) return;

        var attempts = getRecentRecoverAttempts();
        if (attempts.length >= SILENT_RECOVER_MAX_ATTEMPTS) {
          // 已達上限：不再嘗試（避免 reload 死循環），也不彈任何提示。
          // 蝴蝶會繼續轉，用戶感受到的只是「載入比較久」，符合「不破壞體驗」的目標。
          console.warn('[boot watchdog] 靜默修復已達上限，停止重試');
          return;
        }

        silentRecoverInFlight = true;
        recordRecoverAttempt();
        console.warn('[boot watchdog] 觸發靜默修復:', reason);

        // 清掉 chunk reload 計數器，讓 main.jsx 的自動恢復鏈也能重新介入
        try {
          sessionStorage.removeItem('nuojiji-chunk-reload');
          sessionStorage.removeItem('nuojiji-chunk-reload-count');
        } catch (_e) { }

        var done = false;
        var doReload = function () {
          if (done) return;
          done = true;
          try {
            var u = new URL(window.location.href);
            u.searchParams.set('__recover', String(Date.now()));
            window.location.replace(u.toString());
          } catch (_e) {
            window.location.reload();
          }
        };
        // 安全網：5 秒後無論清理結果如何都強制 reload
        window.setTimeout(doReload, 5000);

        var unregisterSW = function () {
          if (!('serviceWorker' in navigator)) return Promise.resolve();
          return navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(regs.map(function (r) {
              return r.unregister().catch(function () { });
            }));
          }).catch(function () { });
        };
        var clearCaches = function () {
          if (!('caches' in window)) return Promise.resolve();
          return caches.keys().then(function (names) {
            return Promise.all(names.map(function (n) {
              return caches.delete(n).catch(function () { });
            }));
          }).catch(function () { });
        };
        Promise.all([unregisterSW(), clearCaches()]).finally(doReload);
      }

      // 暴露給 App.jsx：React 完成 init 時主動呼叫，此時可以安全地拆 overlay
      window.__nuojijiForceRemoveLoadingOverlay = forceRemoveLoadingOverlay;

      // 啟動成功標記：React 完成首次渲染後清掉舊的修復計數器，避免污染未來的會話
      // （由 main.jsx 的 resetReloadCounter 在 idle 時呼叫）
      window.__nuojijiClearRecoverAttempts = function () {
        try { localStorage.removeItem(SILENT_RECOVER_KEY); } catch (_e) { }
      };

      // Stage 1：若主腳本都還沒啟動，通常是更新窗口 chunk/module 問題，快速進行靜默修復。
      window.setTimeout(function () {
        if (hasReactRenderedContent() || hasAppReadySignal()) return;
        if (hasMainScriptStarted()) return;

        // 頁面在背景時瀏覽器可能節流，延後判斷一次。
        if (document.visibilityState === 'hidden') {
          window.setTimeout(function () {
            if (!hasReactRenderedContent() && !hasMainScriptStarted()) {
              silentRecover('watchdog-stage1-main-script-not-started-hidden');
            }
          }, 5000);
          return;
        }

        silentRecover('watchdog-stage1-main-script-not-started');
      }, WATCHDOG_STAGE1_MS);

      // Stage 2：主腳本有啟動但仍長時間沒內容，才視為初始化失敗。
      window.setTimeout(function () {
        if (hasReactRenderedContent() || hasAppReadySignal()) return;

        if (document.visibilityState === 'hidden') {
          window.setTimeout(function () {
            if (!hasReactRenderedContent() && !hasAppReadySignal()) {
              silentRecover('watchdog-stage2-after-hidden');
            }
          }, 5000);
          return;
        }

        silentRecover('watchdog-stage2-app-not-rendered');
      }, WATCHDOG_STAGE2_MS);

      // window load 之後若已有內容就立刻拆 overlay（不等 App.jsx 主動呼叫）
      window.addEventListener('load', function () {
        window.setTimeout(function () {
          if (hasReactRenderedContent()) {
            forceRemoveLoadingOverlay('window-load');
          }
        }, 300);
      }, { once: true });
    })();

    // 在 React 加载前立即检查锁屏设置，防止 dock 闪现
    (function () {
      const lockEnabled = localStorage.getItem('lockScreenEnabled') === 'true';
      const alreadyUnlocked = sessionStorage.getItem('unlocked') === 'true';

      if (lockEnabled && !alreadyUnlocked) {
        document.body.classList.add('locking-mode');
      }
    })();
  </script>
